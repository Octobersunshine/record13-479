<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网络速率测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 660px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 8px;
      font-size: 28px;
      text-align: center;
    }
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 28px;
      font-size: 14px;
    }
    .mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #e2e8f0;
    }
    .mode-tab {
      flex: 1;
      padding: 12px 8px;
      background: #f8fafc;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #718096;
      transition: all 0.2s ease;
      text-align: center;
    }
    .mode-tab:not(:last-child) {
      border-right: 1px solid #e2e8f0;
    }
    .mode-tab:hover {
      background: #edf2ff;
      color: #667eea;
    }
    .mode-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }
    .drop-zone {
      border: 3px dashed #cbd5e0;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8fafc;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #667eea;
      background: #edf2ff;
    }
    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .drop-zone-text {
      color: #4a5568;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .drop-zone-hint {
      color: #a0aec0;
      font-size: 13px;
    }
    #fileInput {
      display: none;
    }
    .file-info {
      margin-top: 20px;
      padding: 16px;
      background: #f0f4ff;
      border-radius: 8px;
      display: none;
    }
    .file-info.active {
      display: block;
    }
    .file-name {
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .file-size {
      color: #718096;
      font-size: 14px;
    }
    .size-selector {
      margin-top: 20px;
    }
    .size-selector-label {
      color: #4a5568;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .size-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .size-option {
      padding: 8px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #718096;
      transition: all 0.2s ease;
    }
    .size-option:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .size-option.active {
      border-color: #667eea;
      background: #edf2ff;
      color: #667eea;
    }
    .action-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px 24px;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-upload {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      opacity: 0.5;
      pointer-events: none;
    }
    .btn-upload.active {
      opacity: 1;
      pointer-events: auto;
    }
    .btn-download {
      background: linear-gradient(135deg, #38b2ac 0%, #2c7a7b 100%);
    }
    .btn-dual {
      background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
    }
    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .progress-container {
      margin-top: 24px;
      display: none;
    }
    .progress-container.active {
      display: block;
    }
    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.2s ease;
      width: 0%;
    }
    .progress-fill.upload {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }
    .progress-fill.download {
      background: linear-gradient(90deg, #38b2ac 0%, #2c7a7b 100%);
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      color: #718096;
      font-size: 13px;
    }
    .dual-progress {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }
    .dual-progress-item {
      background: #f8fafc;
      border-radius: 8px;
      padding: 16px;
    }
    .dual-progress-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .dual-progress-label.upload-label {
      color: #667eea;
    }
    .dual-progress-label.download-label {
      color: #38b2ac;
    }
    .result {
      margin-top: 24px;
      padding: 24px;
      background: #f0fff4;
      border-radius: 8px;
      border-left: 4px solid #48bb78;
      display: none;
    }
    .result.active {
      display: block;
    }
    .result.error {
      background: #fff5f5;
      border-left-color: #f56565;
    }
    .result-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #2d3748;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .result-grid.triple {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .result-item {
      padding: 12px;
      background: #fff;
      border-radius: 6px;
    }
    .result-label {
      font-size: 12px;
      color: #a0aec0;
      margin-bottom: 4px;
    }
    .result-value {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
    }
    .result-value.highlight {
      color: #667eea;
      font-size: 20px;
    }
    .result-value.highlight-download {
      color: #38b2ac;
      font-size: 20px;
    }
    .result-value.highlight-dual {
      color: #ed8936;
      font-size: 20px;
    }
    .dual-result {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }
    .dual-result-card {
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .dual-result-card.upload-card {
      background: #f0f0ff;
      border: 2px solid #667eea;
    }
    .dual-result-card.download-card {
      background: #f0fffc;
      border: 2px solid #38b2ac;
    }
    .dual-result-card-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .dual-result-card.upload-card .dual-result-card-label {
      color: #667eea;
    }
    .dual-result-card.download-card .dual-result-card-label {
      color: #38b2ac;
    }
    .dual-result-card-speed {
      font-size: 28px;
      font-weight: 700;
    }
    .dual-result-card.upload-card .dual-result-card-speed {
      color: #667eea;
    }
    .dual-result-card.download-card .dual-result-card-speed {
      color: #38b2ac;
    }
    .dual-result-card-detail {
      font-size: 12px;
      color: #718096;
      margin-top: 4px;
    }
    .history {
      margin-top: 32px;
    }
    .history-title {
      font-size: 16px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2e8f0;
    }
    .history-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .history-item {
      padding: 10px 12px;
      background: #f7fafc;
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .history-type {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 8px;
    }
    .history-type.upload {
      background: #edf2ff;
      color: #667eea;
    }
    .history-type.download {
      background: #e6fffa;
      color: #38b2ac;
    }
    .history-type.dual {
      background: #fffaf0;
      color: #ed8936;
    }
    .history-info {
      color: #4a5568;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 12px;
    }
    .history-speed {
      color: #667eea;
      font-weight: 600;
      white-space: nowrap;
    }
    .history-empty {
      color: #a0aec0;
      text-align: center;
      padding: 16px;
      font-size: 13px;
    }
    .dual-size-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .dual-size-group {
      flex: 1;
    }
    .dual-size-group-label {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .dual-size-group-label.upload-label {
      color: #667eea;
    }
    .dual-size-group-label.download-label {
      color: #38b2ac;
    }
    .dual-size-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .dual-size-option {
      padding: 6px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #718096;
      transition: all 0.2s ease;
    }
    .dual-size-option:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .dual-size-option.active-upload {
      border-color: #667eea;
      background: #edf2ff;
      color: #667eea;
    }
    .dual-size-option.active-download {
      border-color: #38b2ac;
      background: #e6fffa;
      color: #38b2ac;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ 网络速率测试</h1>
    <p class="subtitle">上传、下载双向速率检测</p>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="upload">📤 上传测速</button>
      <button class="mode-tab" data-mode="download">📥 下载测速</button>
      <button class="mode-tab" data-mode="dual">⚡ 双向测速</button>
    </div>

    <div class="panel active" id="panelUpload">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">📁</div>
        <div class="drop-zone-text">点击或拖拽文件到此处</div>
        <div class="drop-zone-hint">支持任意格式和大小的文件</div>
      </div>
      <input type="file" id="fileInput">
      <div class="file-info" id="fileInfo">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <button class="action-btn btn-upload" id="uploadBtn" disabled>开始上传</button>
      <div class="progress-container" id="uploadProgress">
        <div class="progress-bar">
          <div class="progress-fill upload" id="uploadProgressFill"></div>
        </div>
        <div class="progress-stats">
          <span id="uploadPercent">0%</span>
          <span id="uploadSpeed">0 KB/s</span>
          <span id="uploadTime">0.0s</span>
        </div>
      </div>
      <div class="result" id="uploadResult">
        <div class="result-title" id="uploadResultTitle">✅ 上传完成</div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">文件名</div>
            <div class="result-value" id="uploadResultFilename"></div>
          </div>
          <div class="result-item">
            <div class="result-label">文件大小</div>
            <div class="result-value" id="uploadResultSize"></div>
          </div>
          <div class="result-item">
            <div class="result-label">平均上传速度</div>
            <div class="result-value highlight" id="uploadResultSpeed"></div>
          </div>
          <div class="result-item">
            <div class="result-label">上传耗时</div>
            <div class="result-value" id="uploadResultTime"></div>
          </div>
          <div class="result-item">
            <div class="result-label">服务端内存(RSS)</div>
            <div class="result-value" id="uploadResultMemRss"></div>
          </div>
          <div class="result-item">
            <div class="result-label">服务端内存(Heap)</div>
            <div class="result-value" id="uploadResultMemHeap"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="panelDownload">
      <div class="size-selector">
        <div class="size-selector-label">选择下载测试大小</div>
        <div class="size-options" id="downloadSizeOptions">
          <button class="size-option" data-size="1mb">1 MB</button>
          <button class="size-option active" data-size="10mb">10 MB</button>
          <button class="size-option" data-size="50mb">50 MB</button>
          <button class="size-option" data-size="100mb">100 MB</button>
          <button class="size-option" data-size="200mb">200 MB</button>
          <button class="size-option" data-size="500mb">500 MB</button>
          <button class="size-option" data-size="1gb">1 GB</button>
        </div>
      </div>
      <button class="action-btn btn-download" id="downloadBtn">开始下载</button>
      <div class="progress-container" id="downloadProgress">
        <div class="progress-bar">
          <div class="progress-fill download" id="downloadProgressFill"></div>
        </div>
        <div class="progress-stats">
          <span id="downloadPercent">0%</span>
          <span id="downloadSpeed">0 KB/s</span>
          <span id="downloadTime">0.0s</span>
        </div>
      </div>
      <div class="result" id="downloadResult">
        <div class="result-title" id="downloadResultTitle">✅ 下载完成</div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">数据大小</div>
            <div class="result-value" id="downloadResultSize"></div>
          </div>
          <div class="result-item">
            <div class="result-label">平均下载速度</div>
            <div class="result-value highlight-download" id="downloadResultSpeed"></div>
          </div>
          <div class="result-item">
            <div class="result-label">下载耗时</div>
            <div class="result-value" id="downloadResultTime"></div>
          </div>
          <div class="result-item">
            <div class="result-label">峰值速度</div>
            <div class="result-value" id="downloadResultPeak"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="panelDual">
      <div class="dual-size-row">
        <div class="dual-size-group">
          <div class="dual-size-group-label upload-label">📤 上传文件</div>
          <div class="drop-zone" id="dualDropZone" style="padding: 20px 12px;">
            <div class="drop-zone-icon" style="font-size: 28px; margin-bottom: 8px;">📁</div>
            <div class="drop-zone-text" style="font-size: 13px;">点击或拖拽文件</div>
          </div>
          <input type="file" id="dualFileInput" style="display: none;">
          <div class="file-info" id="dualFileInfo" style="margin-top: 10px;">
            <div class="file-name" id="dualFileName"></div>
            <div class="file-size" id="dualFileSize"></div>
          </div>
        </div>
        <div class="dual-size-group">
          <div class="dual-size-group-label download-label">📥 下载数据量</div>
          <div class="dual-size-options" id="dualDownloadSizeOptions">
            <button class="dual-size-option active-download" data-size="10mb">10 MB</button>
            <button class="dual-size-option" data-size="50mb">50 MB</button>
            <button class="dual-size-option" data-size="100mb">100 MB</button>
            <button class="dual-size-option" data-size="200mb">200 MB</button>
          </div>
        </div>
      </div>
      <button class="action-btn btn-dual" id="dualBtn" disabled>开始双向测速</button>
      <div class="dual-progress" id="dualProgress" style="display: none;">
        <div class="dual-progress-item">
          <div class="dual-progress-label upload-label">📤 上传</div>
          <div class="progress-bar">
            <div class="progress-fill upload" id="dualUploadFill"></div>
          </div>
          <div class="progress-stats">
            <span id="dualUploadPercent">0%</span>
            <span id="dualUploadSpeed">0 KB/s</span>
          </div>
        </div>
        <div class="dual-progress-item">
          <div class="dual-progress-label download-label">📥 下载</div>
          <div class="progress-bar">
            <div class="progress-fill download" id="dualDownloadFill"></div>
          </div>
          <div class="progress-stats">
            <span id="dualDownloadPercent">0%</span>
            <span id="dualDownloadSpeed">0 KB/s</span>
          </div>
        </div>
      </div>
      <div class="result" id="dualResult">
        <div class="result-title" id="dualResultTitle">✅ 双向测速完成</div>
        <div class="dual-result">
          <div class="dual-result-card upload-card">
            <div class="dual-result-card-label">📤 上传速度</div>
            <div class="dual-result-card-speed" id="dualUploadResultSpeed">-</div>
            <div class="dual-result-card-detail" id="dualUploadDetail"></div>
          </div>
          <div class="dual-result-card download-card">
            <div class="dual-result-card-label">📥 下载速度</div>
            <div class="dual-result-card-speed" id="dualDownloadResultSpeed">-</div>
            <div class="dual-result-card-detail" id="dualDownloadDetail"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="history">
      <div class="history-title">📋 测试历史</div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">暂无测试记录</li>
      </ul>
    </div>
  </div>

  <script>
    function formatSize(bytes) {
      if (bytes >= 1024 * 1024 * 1024) {
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
      } else if (bytes >= 1024 * 1024) {
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      } else if (bytes >= 1024) {
        return (bytes / 1024).toFixed(2) + ' KB';
      } else {
        return bytes + ' B';
      }
    }

    function formatSpeed(bytesPerSecond) {
      if (bytesPerSecond >= 1024 * 1024) {
        return (bytesPerSecond / (1024 * 1024)).toFixed(2) + ' MB/s';
      } else if (bytesPerSecond >= 1024) {
        return (bytesPerSecond / 1024).toFixed(2) + ' KB/s';
      } else {
        return bytesPerSecond.toFixed(2) + ' B/s';
      }
    }

    const SIZE_MAP = {
      '1mb': 1 * 1024 * 1024,
      '10mb': 10 * 1024 * 1024,
      '50mb': 50 * 1024 * 1024,
      '100mb': 100 * 1024 * 1024,
      '200mb': 200 * 1024 * 1024,
      '500mb': 500 * 1024 * 1024,
      '1gb': 1024 * 1024 * 1024
    };

    let testHistory = [];

    // ============ Mode Tabs ============
    const modeTabs = document.querySelectorAll('.mode-tab');
    const panels = document.querySelectorAll('.panel');

    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        modeTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        panels.forEach(p => p.classList.remove('active'));
        const mode = tab.dataset.mode;
        document.getElementById('panel' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
      });
    });

    // ============ Upload Panel ============
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadProgress = document.getElementById('uploadProgress');
    const uploadProgressFill = document.getElementById('uploadProgressFill');
    const uploadPercent = document.getElementById('uploadPercent');
    const uploadSpeedEl = document.getElementById('uploadSpeed');
    const uploadTimeEl = document.getElementById('uploadTime');
    const uploadResult = document.getElementById('uploadResult');

    let selectedFile = null;

    function handleFileSelect(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      fileInfo.classList.add('active');
      uploadBtn.classList.add('active');
      uploadBtn.disabled = false;
      uploadResult.classList.remove('active', 'error');
      uploadProgress.classList.remove('active');
    }

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFileSelect(e.target.files[0]);
    });

    uploadBtn.addEventListener('click', () => {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('file', selectedFile);
      const xhr = new XMLHttpRequest();
      const startTime = Date.now();

      uploadBtn.disabled = true;
      uploadBtn.textContent = '上传中...';
      uploadProgress.classList.add('active');
      uploadResult.classList.remove('active', 'error');

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const elapsed = (Date.now() - startTime) / 1000;
          const percent = Math.round((e.loaded / e.total) * 100);
          const currentSpeed = elapsed > 0 ? e.loaded / elapsed : 0;
          uploadProgressFill.style.width = percent + '%';
          uploadPercent.textContent = percent + '%';
          uploadSpeedEl.textContent = formatSpeed(currentSpeed);
          uploadTimeEl.textContent = elapsed.toFixed(1) + 's';
        }
      });

      xhr.addEventListener('load', () => {
        uploadBtn.disabled = false;
        uploadBtn.textContent = '开始上传';
        try {
          const resp = JSON.parse(xhr.responseText);
          if (resp.success) {
            document.getElementById('uploadResultTitle').textContent = '✅ 上传完成';
            uploadResult.classList.remove('error');
            document.getElementById('uploadResultFilename').textContent = resp.filename;
            document.getElementById('uploadResultSize').textContent = resp.fileSizeFormatted;
            document.getElementById('uploadResultSpeed').textContent = resp.avgSpeedFormatted;
            document.getElementById('uploadResultTime').textContent = resp.durationSec + ' 秒';
            document.getElementById('uploadResultMemRss').textContent = resp.memoryUsage ? resp.memoryUsage.rss : '-';
            document.getElementById('uploadResultMemHeap').textContent = resp.memoryUsage ? resp.memoryUsage.heapUsed : '-';
            uploadResult.classList.add('active');
            addHistory('upload', resp.filename + ' (' + resp.fileSizeFormatted + ')', resp.avgSpeedFormatted);
          } else {
            throw new Error(resp.message || '上传失败');
          }
        } catch (err) {
          document.getElementById('uploadResultTitle').textContent = '❌ 上传失败';
          uploadResult.classList.add('error');
          document.getElementById('uploadResultFilename').textContent = selectedFile.name;
          document.getElementById('uploadResultSize').textContent = formatSize(selectedFile.size);
          document.getElementById('uploadResultSpeed').textContent = '-';
          document.getElementById('uploadResultTime').textContent = err.message;
          document.getElementById('uploadResultMemRss').textContent = '-';
          document.getElementById('uploadResultMemHeap').textContent = '-';
          uploadResult.classList.add('active');
        }
      });

      xhr.addEventListener('error', () => {
        uploadBtn.disabled = false;
        uploadBtn.textContent = '开始上传';
        document.getElementById('uploadResultTitle').textContent = '❌ 网络错误';
        uploadResult.classList.add('error');
        document.getElementById('uploadResultFilename').textContent = selectedFile.name;
        document.getElementById('uploadResultSize').textContent = formatSize(selectedFile.size);
        document.getElementById('uploadResultSpeed').textContent = '-';
        document.getElementById('uploadResultTime').textContent = '请检查网络连接';
        document.getElementById('uploadResultMemRss').textContent = '-';
        document.getElementById('uploadResultMemHeap').textContent = '-';
        uploadResult.classList.add('active');
      });

      xhr.open('POST', '/upload');
      xhr.send(formData);
    });

    // ============ Download Panel ============
    let selectedDownloadSize = '10mb';
    const downloadSizeOptions = document.getElementById('downloadSizeOptions');
    const downloadBtn = document.getElementById('downloadBtn');
    const downloadProgress = document.getElementById('downloadProgress');
    const downloadProgressFill = document.getElementById('downloadProgressFill');
    const downloadPercent = document.getElementById('downloadPercent');
    const downloadSpeedEl = document.getElementById('downloadSpeed');
    const downloadTimeEl = document.getElementById('downloadTime');
    const downloadResult = document.getElementById('downloadResult');

    downloadSizeOptions.addEventListener('click', (e) => {
      if (e.target.classList.contains('size-option')) {
        downloadSizeOptions.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        selectedDownloadSize = e.target.dataset.size;
      }
    });

    downloadBtn.addEventListener('click', () => {
      downloadBtn.disabled = true;
      downloadBtn.textContent = '下载中...';
      downloadProgress.classList.add('active');
      downloadResult.classList.remove('active', 'error');
      downloadProgressFill.style.width = '0%';

      const startTime = Date.now();
      const totalBytes = SIZE_MAP[selectedDownloadSize] || 10 * 1024 * 1024;
      let receivedBytes = 0;
      let peakSpeed = 0;
      let lastLoaded = 0;
      let lastTime = startTime;

      const xhr = new XMLHttpRequest();
      xhr.responseType = 'arraybuffer';

      xhr.addEventListener('progress', (e) => {
        const now = Date.now();
        receivedBytes = e.loaded;
        const totalElapsed = (now - startTime) / 1000;
        const intervalElapsed = (now - lastTime) / 1000;
        const intervalSpeed = intervalElapsed > 0 ? (e.loaded - lastLoaded) / intervalElapsed : 0;
        const avgSpeed = totalElapsed > 0 ? e.loaded / totalElapsed : 0;

        if (intervalSpeed > peakSpeed) peakSpeed = intervalSpeed;
        lastLoaded = e.loaded;
        lastTime = now;

        if (e.lengthComputable) {
          const percent = Math.round((e.loaded / e.total) * 100);
          downloadProgressFill.style.width = percent + '%';
          downloadPercent.textContent = percent + '%';
        }
        downloadSpeedEl.textContent = formatSpeed(avgSpeed);
        downloadTimeEl.textContent = totalElapsed.toFixed(1) + 's';
      });

      xhr.addEventListener('load', () => {
        const endTime = Date.now();
        const durationSec = (endTime - startTime) / 1000;
        const avgSpeed = durationSec > 0 ? receivedBytes / durationSec : 0;

        downloadBtn.disabled = false;
        downloadBtn.textContent = '开始下载';

        document.getElementById('downloadResultTitle').textContent = '✅ 下载完成';
        downloadResult.classList.remove('error');
        document.getElementById('downloadResultSize').textContent = formatSize(receivedBytes);
        document.getElementById('downloadResultSpeed').textContent = formatSpeed(avgSpeed);
        document.getElementById('downloadResultTime').textContent = durationSec.toFixed(3) + ' 秒';
        document.getElementById('downloadResultPeak').textContent = formatSpeed(peakSpeed);
        downloadResult.classList.add('active');

        addHistory('download', '下载测试 (' + formatSize(receivedBytes) + ')', formatSpeed(avgSpeed));
      });

      xhr.addEventListener('error', () => {
        downloadBtn.disabled = false;
        downloadBtn.textContent = '开始下载';
        document.getElementById('downloadResultTitle').textContent = '❌ 下载失败';
        downloadResult.classList.add('error');
        document.getElementById('downloadResultSize').textContent = '-';
        document.getElementById('downloadResultSpeed').textContent = '-';
        document.getElementById('downloadResultTime').textContent = '请检查网络连接';
        document.getElementById('downloadResultPeak').textContent = '-';
        downloadResult.classList.add('active');
      });

      xhr.open('GET', '/download?size=' + selectedDownloadSize);
      xhr.send();
    });

    // ============ Dual Panel ============
    const dualDropZone = document.getElementById('dualDropZone');
    const dualFileInput = document.getElementById('dualFileInput');
    const dualFileInfo = document.getElementById('dualFileInfo');
    const dualFileName = document.getElementById('dualFileName');
    const dualFileSize = document.getElementById('dualFileSize');
    const dualBtn = document.getElementById('dualBtn');
    const dualProgress = document.getElementById('dualProgress');
    const dualResult = document.getElementById('dualResult');

    let dualSelectedFile = null;
    let dualSelectedDownloadSize = '10mb';

    dualDropZone.addEventListener('click', () => dualFileInput.click());
    dualDropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dualDropZone.classList.add('dragover');
    });
    dualDropZone.addEventListener('dragleave', () => dualDropZone.classList.remove('dragover'));
    dualDropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dualDropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleDualFileSelect(e.dataTransfer.files[0]);
    });
    dualFileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleDualFileSelect(e.target.files[0]);
    });

    function handleDualFileSelect(file) {
      dualSelectedFile = file;
      dualFileName.textContent = file.name;
      dualFileSize.textContent = formatSize(file.size);
      dualFileInfo.classList.add('active');
      dualBtn.disabled = false;
      dualResult.classList.remove('active', 'error');
      dualProgress.style.display = 'none';
    }

    const dualDownloadSizeOptions = document.getElementById('dualDownloadSizeOptions');
    dualDownloadSizeOptions.addEventListener('click', (e) => {
      if (e.target.classList.contains('dual-size-option')) {
        dualDownloadSizeOptions.querySelectorAll('.dual-size-option').forEach(b => b.classList.remove('active-download'));
        e.target.classList.add('active-download');
        dualSelectedDownloadSize = e.target.dataset.size;
      }
    });

    dualBtn.addEventListener('click', () => {
      if (!dualSelectedFile) return;

      dualBtn.disabled = true;
      dualBtn.textContent = '双向测速中...';
      dualProgress.style.display = 'grid';
      dualResult.classList.remove('active', 'error');

      const uploadStartTime = Date.now();
      const downloadStartTime = Date.now();
      let uploadDone = false;
      let downloadDone = false;
      let uploadResultData = null;
      let downloadResultData = null;

      function checkBothDone() {
        if (uploadDone && downloadDone) {
          dualBtn.disabled = false;
          dualBtn.textContent = '开始双向测速';

          if (uploadResultData && downloadResultData) {
            document.getElementById('dualResultTitle').textContent = '✅ 双向测速完成';
            dualResult.classList.remove('error');
            document.getElementById('dualUploadResultSpeed').textContent = uploadResultData.avgSpeedFormatted;
            document.getElementById('dualUploadDetail').textContent = uploadResultData.filename + ' · ' + uploadResultData.fileSizeFormatted + ' · ' + uploadResultData.durationSec + 's';
            document.getElementById('dualDownloadResultSpeed').textContent = downloadResultData.avgSpeedFormatted;
            document.getElementById('dualDownloadDetail').textContent = formatSize(downloadResultData.totalBytes) + ' · ' + downloadResultData.durationSec.toFixed(3) + 's';
            dualResult.classList.add('active');
            addHistory('dual', uploadResultData.avgSpeedFormatted + ' ↑ / ' + downloadResultData.avgSpeedFormatted + ' ↓', '-');
          } else {
            document.getElementById('dualResultTitle').textContent = '❌ 双向测速失败';
            dualResult.classList.add('error');
            dualResult.classList.add('active');
          }
        }
      }

      // Upload
      const uploadFormData = new FormData();
      uploadFormData.append('file', dualSelectedFile);
      const uploadXhr = new XMLHttpRequest();

      uploadXhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const elapsed = (Date.now() - uploadStartTime) / 1000;
          const percent = Math.round((e.loaded / e.total) * 100);
          const currentSpeed = elapsed > 0 ? e.loaded / elapsed : 0;
          document.getElementById('dualUploadFill').style.width = percent + '%';
          document.getElementById('dualUploadPercent').textContent = percent + '%';
          document.getElementById('dualUploadSpeed').textContent = formatSpeed(currentSpeed);
        }
      });

      uploadXhr.addEventListener('load', () => {
        uploadDone = true;
        try {
          const resp = JSON.parse(uploadXhr.responseText);
          if (resp.success) {
            uploadResultData = resp;
          }
        } catch (e) {}
        checkBothDone();
      });
      uploadXhr.addEventListener('error', () => { uploadDone = true; checkBothDone(); });

      // Download
      const downloadXhr = new XMLHttpRequest();
      downloadXhr.responseType = 'arraybuffer';
      const dlTotalBytes = SIZE_MAP[dualSelectedDownloadSize] || 10 * 1024 * 1024;
      let dlLastLoaded = 0;
      let dlLastTime = downloadStartTime;

      downloadXhr.addEventListener('progress', (e) => {
        const now = Date.now();
        const elapsed = (now - downloadStartTime) / 1000;
        const intervalElapsed = (now - dlLastTime) / 1000;
        const avgSpeed = elapsed > 0 ? e.loaded / elapsed : 0;
        dlLastLoaded = e.loaded;
        dlLastTime = now;

        if (e.lengthComputable) {
          const percent = Math.round((e.loaded / e.total) * 100);
          document.getElementById('dualDownloadFill').style.width = percent + '%';
          document.getElementById('dualDownloadPercent').textContent = percent + '%';
        }
        document.getElementById('dualDownloadSpeed').textContent = formatSpeed(avgSpeed);
      });

      downloadXhr.addEventListener('load', () => {
        downloadDone = true;
        const endTime = Date.now();
        const durationSec = (endTime - downloadStartTime) / 1000;
        const receivedBytes = downloadXhr.response.byteLength;
        const avgSpeed = durationSec > 0 ? receivedBytes / durationSec : 0;
        downloadResultData = {
          avgSpeedFormatted: formatSpeed(avgSpeed),
          totalBytes: receivedBytes,
          durationSec: durationSec
        };
        checkBothDone();
      });
      downloadXhr.addEventListener('error', () => { downloadDone = true; checkBothDone(); });

      uploadXhr.open('POST', '/upload');
      downloadXhr.open('GET', '/download?size=' + dualSelectedDownloadSize);

      uploadXhr.send(uploadFormData);
      downloadXhr.send();
    });

    // ============ History ============
    function addHistory(type, info, speed) {
      testHistory.unshift({ type, info, speed });
      if (testHistory.length > 15) testHistory.pop();
      updateHistory();
    }

    function updateHistory() {
      const historyList = document.getElementById('historyList');
      if (testHistory.length === 0) {
        historyList.innerHTML = '<li class="history-empty">暂无测试记录</li>';
        return;
      }
      historyList.innerHTML = testHistory.map((item) => {
        const typeLabel = item.type === 'upload' ? '上传' : item.type === 'download' ? '下载' : '双向';
        return '<li class="history-item">' +
          '<span class="history-type ' + item.type + '">' + typeLabel + '</span>' +
          '<span class="history-info">' + item.info + '</span>' +
          '<span class="history-speed">' + item.speed + '</span>' +
        '</li>';
      }).join('');
    }
  </script>
</body>
</html>
